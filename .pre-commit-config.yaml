fail_fast: true

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format composer
        language: system
        types: [python]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check composer --fix
        language: system
        types: [python]

      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright composer
        language: system
        types: [python]